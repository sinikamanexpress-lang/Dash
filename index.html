<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Baby Cash Coin</title>

  <link rel="stylesheet" href="style.css"/>

  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
</head>

<body>

  <!-- BACKGROUND -->
  <div class="background"></div>

  <!-- APP -->
  <div class="app">

    <!-- HEADER -->
    <header class="header">

      <div>
        <p class="hello">Bonjour 👋</p>
        <h2 class="user-name">Utilisateur</h2>
      </div>

      <div class="header-right">

        <!-- DARK MODE -->
        <button class="theme-btn" id="themeBtn">
          <i class="fa-solid fa-moon"></i>
        </button>

        <!-- AVATAR -->
        <div class="avatar">
          <img src="images/avatar-default.jpg" alt="">
        </div>

      </div>

    </header>

    <!-- SOLDE -->
    <section class="balance-card">

      <div class="card-effect"></div>

      <p class="balance-text">
        Solde principal
      </p>

      <h1 class="balance">
        0 BCC
      </h1>

      <p class="cfa">
        ≈ 0 CFA
      </p>

    </section>

    <!-- ACTIONS -->
    <section class="actions">

      <button class="action-btn">
        <i class="fa-solid fa-paper-plane"></i>
        <span>Envoyer</span>
      </button>

      <button class="action-btn">
        <i class="fa-solid fa-download"></i>
        <span>Recevoir</span>
      </button>

      <button class="action-btn">
        <i class="fa-solid fa-qrcode"></i>
        <span>Scanner</span>
      </button>

      <button class="action-btn">
        <i class="fa-solid fa-arrows-rotate"></i>
        <span>Convertir</span>
      </button>

    </section>

    <!-- HISTORIQUE -->
    <section class="history">

      <div class="history-empty">

        <i class="fa-solid fa-clock-rotate-left"></i>

        <h3>
          Aucun historique disponible
        </h3>

        <p>
          Vos transactions apparaîtront ici
        </p>

      </div>

    </section>

  </div>

  <!-- NAVIGATION -->
  <nav class="bottom-nav">

    <button class="nav-btn active">
      <i class="fa-solid fa-house"></i>
    </button>

    <button class="nav-btn">
      <i class="fa-solid fa-gift"></i>
    </button>

    <!-- LOGO CENTRAL -->
    <button class="center-btn">
      <img src="images/logo-bcc.png" alt="">
    </button>

    <button class="nav-btn">
      <i class="fa-solid fa-chart-line"></i>
    </button>

    <button class="nav-btn">
      <i class="fa-solid fa-user"></i>
    </button>

  </nav>

  <!-- POPUP -->
  <div class="popup" id="popup">
    Service disponible bientôt
  </div>

  <script src="script.js"></script>

</body>
                            </html>
